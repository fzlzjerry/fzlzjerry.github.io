<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        const segment = 1;
        const l = window.location;
        const redirectPath = l.pathname.split('/').slice(0, 1 + segment).join('/');
        sessionStorage.redirect = l.pathname + l.search + l.hash;
        l.replace(redirectPath + '/?page=' + encodeURIComponent(l.pathname.slice(1)));
    </script>
</head>
<body>
    <h1>Page Not Found</h1>
    <p>Redirecting...</p>
</body>
</html>
