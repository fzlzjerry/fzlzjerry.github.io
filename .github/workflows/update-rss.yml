name: Update RSS Feed

on:
  push:
    branches:
      - main
    paths:
      - 'blog.html'
      - 'scripts.js'
      - 'rss.xml'
      - 'assets/md/**'

jobs:
  update-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: false  # Disable fetching GitHub token in this step

      - name: Set up GitHub token
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUBTOKEN }}@github.com/${{ github.repository }}.git

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Install dependencies
        run: npm install

      - name: Update RSS feed
        run: node scripts.js update-rss

      - name: Pull latest changes
        run: git pull origin main --rebase --autostash

      - name: Commit and push changes
        run: |
          git add rss.xml
          git commit -m "Update RSS feed [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main || git push origin HEAD:main --force